openapi: 3.0.0
info:
  title: 家庭记账系统API
  description: 家庭记账系统后端接口文档
  version: 1.0.0
  contact:
    name: Family Bill API Support

servers:
  - url: http://127.0.0.1:8090
    description: 本地开发环境

paths:
  /api/bills:
    get:
      tags:
        - 账单管理
      summary: 分页查询账单列表
      description: 支持按时间、类型、支付方式、分类等条件筛选查询账单
      parameters:
        - name: pageNum
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          description: 每页大小
          required: false
          schema:
            type: integer
            default: 10
        - name: startTime
          in: query
          description: 开始时间
          required: false
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          description: 结束时间
          required: false
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          description: 类型：1-支出，2-收入
          required: false
          schema:
            type: integer
            enum: [1, 2]
        - name: paymentMethodId
          in: query
          description: 支付方式ID
          required: false
          schema:
            type: integer
            format: int64
        - name: categoryId
          in: query
          description: 分类ID
          required: false
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResult'
    post:
      tags:
        - 账单管理
      summary: 新增账单
      description: 创建新的账单记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillDTO'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/bills/{id}:
    get:
      tags:
        - 账单管理
      summary: 根据ID查询账单
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
    put:
      tags:
        - 账单管理
      summary: 更新账单
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillDTO'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'
    delete:
      tags:
        - 账单管理
      summary: 删除账单
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/bills/statistics:
    get:
      tags:
        - 账单管理
      summary: 获取统计信息
      description: 获取总收入、总支出、净收入及分类统计、支付方式统计
      parameters:
        - name: startTime
          in: query
          description: 开始时间
          required: false
          schema:
            type: string
            format: date-time
        - name: endTime
          in: query
          description: 结束时间
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/payment-methods:
    get:
      tags:
        - 支付方式管理
      summary: 查询所有支付方式
      parameters:
        - name: type
          in: query
          description: 类型：1-支出方式，2-收入方式，3-通用
          required: false
          schema:
            type: integer
            enum: [1, 2, 3]
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /api/categories:
    get:
      tags:
        - 账单分类管理
      summary: 查询所有分类
      parameters:
        - name: type
          in: query
          description: 类型：1-支出，2-收入
          required: false
          schema:
            type: integer
            enum: [1, 2]
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

components:
  schemas:
    Result:
      type: object
      properties:
        code:
          type: integer
          description: 状态码
          example: 200
        message:
          type: string
          description: 响应消息
          example: 操作成功
        data:
          type: object
          description: 响应数据
        timestamp:
          type: integer
          format: int64
          description: 时间戳
          example: 1699000000000

    PageResult:
      allOf:
        - $ref: '#/components/schemas/Result'
        - type: object
          properties:
            data:
              type: object
              properties:
                records:
                  type: array
                  items:
                    $ref: '#/components/schemas/BillVO'
                total:
                  type: integer
                  description: 总记录数
                size:
                  type: integer
                  description: 每页大小
                current:
                  type: integer
                  description: 当前页码
                pages:
                  type: integer
                  description: 总页数

    BillDTO:
      type: object
      required:
        - payee
        - amount
        - transactionTime
        - paymentMethodId
      properties:
        payee:
          type: string
          description: 收款方
          example: 超市
        amount:
          type: number
          format: decimal
          description: 金额（支出为负数，收入为正数）
          example: -100.00
        transactionTime:
          type: string
          format: date-time
          description: 交易时间
          example: '2024-01-01 10:00:00'
        paymentMethodId:
          type: integer
          format: int64
          description: 支付方式ID
          example: 1
        transactionNo:
          type: string
          description: 交易号
          example: WX20240101100000
        categoryId:
          type: integer
          format: int64
          description: 分类ID
          example: 3
        remark:
          type: string
          description: 备注
          example: 日常用品

    BillVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 账单ID
        payee:
          type: string
          description: 收款方
        amount:
          type: number
          format: decimal
          description: 金额
        transactionTime:
          type: string
          format: date-time
          description: 交易时间
        paymentMethodId:
          type: integer
          format: int64
          description: 支付方式ID
        paymentMethodName:
          type: string
          description: 支付方式名称
        transactionNo:
          type: string
          description: 交易号
        categoryId:
          type: integer
          format: int64
          description: 分类ID
        categoryName:
          type: string
          description: 分类名称
        remark:
          type: string
          description: 备注
        createTime:
          type: string
          format: date-time
          description: 创建时间

    StatisticsVO:
      type: object
      properties:
        totalIncome:
          type: number
          format: decimal
          description: 总收入
        totalExpense:
          type: number
          format: decimal
          description: 总支出
        netIncome:
          type: number
          format: decimal
          description: 净收入
        categoryStatistics:
          type: array
          items:
            type: object
            properties:
              categoryId:
                type: integer
                format: int64
              categoryName:
                type: string
              amount:
                type: number
                format: decimal
              type:
                type: integer
        paymentMethodStatistics:
          type: array
          items:
            type: object
            properties:
              paymentMethodId:
                type: integer
                format: int64
              paymentMethodName:
                type: string
              amount:
                type: number
                format: decimal

    PaymentMethod:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 支付方式名称
        icon:
          type: string
          description: 图标URL
        type:
          type: integer
          description: 类型：1-支出方式，2-收入方式，3-通用
        sortOrder:
          type: integer
          description: 排序顺序
        status:
          type: integer
          description: 状态：1-启用，0-禁用
        createTime:
          type: string
          format: date-time
        updateTime:
          type: string
          format: date-time

    BillCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: 分类名称
        icon:
          type: string
          description: 图标URL
        type:
          type: integer
          description: 类型：1-支出，2-收入
        parentId:
          type: integer
          format: int64
          description: 父分类ID
        sortOrder:
          type: integer
          description: 排序顺序
        status:
          type: integer
          description: 状态：1-启用，0-禁用
        createTime:
          type: string
          format: date-time
        updateTime:
          type: string
          format: date-time


