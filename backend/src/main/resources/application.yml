# 开发环境配置示例
# 复制此文件并根据实际情况修改配置

server:
  port: 8090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/family_bill?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456  # 请修改为实际密码
  
  redis:
    host: localhost
    port: 6379
    password:  # 如果有密码，请填写
    database: 0

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 强制使用AntPathMatcher，兼容Springfox

